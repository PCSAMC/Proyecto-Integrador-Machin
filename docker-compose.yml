# ============================================================
#  docker-compose.yml — Grupo 4 Ames Housing
#  Levanta todo con un solo comando:  docker compose up
# ============================================================
services:
  ames-housing:
    build:
      context: .
      args:
        # Linux/x86 (default): requirements.txt
        # macOS Apple Silicon:  requirements-macos.txt
        REQS: requirements.txt
    container_name: ames_housing_grupo4
    ports:
      - "8501:8501"        # demo web Streamlit
      - "5001:5000"        # MLflow UI (host:5001 → container:5000; macOS AirPlay ocupa el 5000)
    volumes:
      # Persisten los artefactos generados en tu máquina,
      # para que el segundo arranque sea instantáneo.
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
      - ./mlruns:/app/mlruns
